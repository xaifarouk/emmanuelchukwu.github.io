{{ define "main" }}
<style>
.cs-wrap{max-width:680px;margin:0 auto;padding:80px 0 100px;text-align:center}
.cs-spine{height:4px;width:48px;border-radius:2px;background:linear-gradient(90deg,#c9a84c,#a07830);margin:0 auto 32px}
.cs-tag{font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:#c9a84c;margin-bottom:16px}
.cs-title{font-family:'Playfair Display',serif;font-size:36px;line-height:1.2;color:#e8e4dc;font-weight:400;margin-bottom:16px}
.cs-desc{font-size:16px;color:rgba(232,228,220,0.5);line-height:1.75;max-width:480px;margin:0 auto 48px}
.cs-divider{height:0.5px;background:rgba(255,255,255,0.07);max-width:320px;margin:0 auto 48px}
.cs-notify{font-size:13px;color:rgba(232,228,220,0.35);margin-bottom:20px}
.cs-btn{display:inline-block;padding:11px 28px;background:rgba(201,168,76,0.12);border:0.5px solid rgba(201,168,76,0.35);border-radius:6px;color:#c9a84c;font-size:13px;text-decoration:none;letter-spacing:0.04em;transition:all 0.2s}
.cs-btn:hover{background:rgba(201,168,76,0.2);border-color:rgba(201,168,76,0.6)}
.cs-back{display:inline-block;margin-top:20px;font-size:12px;color:rgba(232,228,220,0.28);text-decoration:none;letter-spacing:0.04em;transition:color 0.2s}
.cs-back:hover{color:rgba(232,228,220,0.55)}
.cs-back::before{content:'← '}
</style>

<div class="cs-wrap">
  <div class="cs-spine"></div>
  <div class="cs-tag">Coming Soon</div>
  <h1 class="cs-title">{{ .Title }}</h1>
  <p class="cs-desc">{{ .Description }}</p>
  <div class="cs-divider"></div>
  <p class="cs-notify">Get notified when this goes live — subscribe to the newsletter.</p>
  <a class="cs-btn" href="https://mindcrafteduniverse.substack.com/subscribe" target="_blank">Subscribe for updates →</a>
  <br>
  <a class="cs-back" href="/">Return to homepage</a>
</div>
{{ end }}
