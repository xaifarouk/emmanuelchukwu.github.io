<header class="header">
<nav class="nav">
  <div class="nav-top">
    <a class="brand" href="{{ "" | absLangURL }}">
      <img class="brand-mark" src="/logo.png" alt="Xaitopia Research logo">
      <div class="brand-text">
        <span class="brand-main">Xaitopia Research</span>
        <span class="brand-sub">Emmanuel Chukwu</span>
      </div>
    </a>
    <button class="nav-burger" aria-label="Toggle menu" aria-expanded="false" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="nav-links" id="nav-links">
    {{- range site.Menus.main }}
      {{- if .HasChildren }}
      <div class="nav-dropdown">
        <button class="nav-dd-btn" aria-expanded="false">
          {{- .Name }}<span class="nav-dd-arrow">▾</span>
        </button>
        <div class="nav-dd-menu">
          {{- range .Children }}
          <a href="{{ .URL }}" class="nav-dd-item">{{ .Name }}</a>
          {{- end }}
        </div>
      </div>
      {{- else }}
      <a href="{{ .URL }}"
        {{- if (findRE `^/` .URL) }}
        {{- if eq .URL $.Page.RelPermalink }} aria-current="page"{{end}}
        {{- end }}>{{ .Name }}</a>
      {{- end }}
    {{- end }}
  </div>
</nav>
</header>

<style>
.header{padding:14px 40px;border-bottom:0.5px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:100;background:#111}
.nav{max-width:1100px;margin:0 auto}
.nav-top{display:flex;justify-content:space-between;align-items:center}
.brand{text-decoration:none;display:flex;align-items:center;gap:10px}
.brand-mark{width:38px;height:38px;object-fit:contain;flex-shrink:0;display:block}
.brand-text{display:flex;flex-direction:column;gap:1px}
.brand-main{font-size:15px;font-weight:500;color:#e8e4dc;letter-spacing:0.01em;line-height:1.2}
.brand-sub{font-size:10px;color:rgba(232,228,220,0.3);letter-spacing:0.02em}

/* Burger button — hidden on desktop */
.nav-burger{display:none;flex-direction:column;gap:5px;background:transparent;border:none;cursor:pointer;padding:4px}
.nav-burger span{display:block;width:22px;height:2px;background:rgba(232,228,220,0.6);border-radius:2px;transition:all 0.2s}
.nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-burger.open span:nth-child(2){opacity:0}
.nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* Desktop nav links */
.nav-links{display:flex;align-items:center;gap:4px}
.nav-links a{font-size:13px;color:rgba(232,228,220,0.48);text-decoration:none;letter-spacing:0.03em;padding:6px 10px;border-radius:5px;transition:color 0.2s}
.nav-links a:hover,.nav-links a[aria-current="page"]{color:#e8e4dc}
.nav-dropdown{position:relative}
.nav-dd-btn{font-size:13px;color:rgba(232,228,220,0.48);background:transparent;border:none;cursor:pointer;letter-spacing:0.03em;padding:6px 10px;border-radius:5px;display:flex;align-items:center;gap:4px;font-family:inherit;transition:color 0.2s}
.nav-dd-btn:hover{color:#e8e4dc}
.nav-dd-arrow{font-size:9px;transition:transform 0.18s}
.nav-dd-btn[aria-expanded="true"] .nav-dd-arrow{transform:rotate(180deg)}
.nav-dd-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;background:#1a1a1a;border:0.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px;min-width:150px;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.nav-dd-menu.open{display:block}
.nav-dd-item{display:block;font-size:13px;color:rgba(232,228,220,0.52);text-decoration:none;padding:8px 12px;border-radius:5px;letter-spacing:0.03em;transition:all 0.15s}
.nav-dd-item:hover{background:rgba(255,255,255,0.05);color:#e8e4dc}

/* Mobile styles */
@media(max-width:680px){
  .header{padding:12px 20px}
  .brand-sub{display:none}
  .nav-burger{display:flex}

  .nav-links{
    display:none;
    flex-direction:column;
    align-items:flex-start;
    gap:2px;
    padding:12px 0 8px;
    border-top:0.5px solid rgba(255,255,255,0.07);
    margin-top:12px;
  }
  .nav-links.open{display:flex}

  .nav-links a{
    font-size:14px;
    padding:10px 4px;
    width:100%;
    border-radius:0;
    border-bottom:0.5px solid rgba(255,255,255,0.04);
    color:rgba(232,228,220,0.6);
  }
  .nav-links a:last-of-type{border-bottom:none}

  .nav-dropdown{width:100%}
  .nav-dd-btn{
    font-size:14px;
    padding:10px 4px;
    width:100%;
    justify-content:space-between;
    border-radius:0;
    border-bottom:0.5px solid rgba(255,255,255,0.04);
    color:rgba(232,228,220,0.6);
  }
  .nav-dd-menu{
    position:static;
    box-shadow:none;
    background:rgba(255,255,255,0.03);
    border:none;
    border-radius:0;
    padding:0 0 0 12px;
    margin-bottom:4px;
  }
  .nav-dd-item{
    font-size:13px;
    padding:8px 8px;
    border-bottom:0.5px solid rgba(255,255,255,0.04);
  }
  .nav-dd-item:last-child{border-bottom:none}
}
</style>

<script>
function toggleMenu(){
  var links = document.getElementById('nav-links');
  var burger = document.querySelector('.nav-burger');
  var isOpen = links.classList.contains('open');
  links.classList.toggle('open');
  burger.classList.toggle('open');
  burger.setAttribute('aria-expanded', !isOpen);
  // close any open dropdowns when closing menu
  if(isOpen){
    document.querySelectorAll('.nav-dd-menu').forEach(function(m){m.classList.remove('open')});
    document.querySelectorAll('.nav-dd-btn').forEach(function(b){b.setAttribute('aria-expanded','false')});
  }
}

document.querySelectorAll('.nav-dropdown').forEach(function(d){
  var btn=d.querySelector('.nav-dd-btn');
  var menu=d.querySelector('.nav-dd-menu');
  btn.addEventListener('click',function(e){
    e.stopPropagation();
    var open=menu.classList.contains('open');
    // on desktop close others
    if(window.innerWidth > 680){
      document.querySelectorAll('.nav-dd-menu').forEach(function(m){m.classList.remove('open')});
      document.querySelectorAll('.nav-dd-btn').forEach(function(b){b.setAttribute('aria-expanded','false')});
    }
    if(!open){menu.classList.add('open');btn.setAttribute('aria-expanded','true')}
    else{menu.classList.remove('open');btn.setAttribute('aria-expanded','false')}
  });
});

document.addEventListener('click',function(){
  if(window.innerWidth > 680){
    document.querySelectorAll('.nav-dd-menu').forEach(function(m){m.classList.remove('open')});
    document.querySelectorAll('.nav-dd-btn').forEach(function(b){b.setAttribute('aria-expanded','false')});
  }
});
</script>
